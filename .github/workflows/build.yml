name: Build Ditto Fork

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: CP_Main_10.sln

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore ${{env.SOLUTION_FILE_PATH}}

      - name: Build
        run: msbuild CP_Main_10.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload Ditto.exe
        uses: actions/upload-artifact@v4
        with:
          name: Ditto-typing-logger
          path: |
            Release64\Ditto.exe
            Release64\ICU_Loader.dll
            Release64\Addins\DittoUtil.dll
          retention-days: 30
